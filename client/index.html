    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary identity -->
    <title>AI Search Visibility Audit for Brands and Agencies | AnswerMonk</title>
    <meta name="description" content="Measure how your brand appears in ChatGPT, Gemini, Perplexity, and AI search, benchmark competitors, and find actions to improve citations and visibility." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://answermonk.ai" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="AnswerMonk" />
    <meta property="og:title"       content="AI Search Visibility Audit for Brands and Agencies | AnswerMonk" />
    <meta property="og:description" content="Measure how your brand appears in ChatGPT, Gemini, Perplexity, and AI search. Benchmark competitors and find actions to improve AI citations and visibility." />
    <meta property="og:url"         content="https://answermonk.ai" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="AI Search Visibility Audit for Brands and Agencies | AnswerMonk" />
    <meta name="twitter:description" content="Measure how your brand appears in ChatGPT, Gemini, and AI search. Free audit — enter your domain to start." />

    <!-- Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AnswerMonk",
      "url": "https://answermonk.ai",
      "description": "AnswerMonk is an AI search visibility platform that helps brands and agencies measure and improve how they appear in ChatGPT, Gemini, Claude, and Perplexity responses."
    }
    </script>

    <!-- WebSite schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AnswerMonk",
      "url": "https://answermonk.ai",
      "description": "AI search visibility audits for brands and agencies. Track and improve your brand's presence in ChatGPT, Gemini, Claude, and Perplexity.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://answermonk.ai/start",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- SoftwareApplication schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AnswerMonk",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://answermonk.ai",
      "description": "AnswerMonk audits your brand's visibility in AI search — running your category's buyer prompts across ChatGPT, Gemini, Claude, and Perplexity to produce a share-of-voice score, competitor leaderboard, and citation source breakdown.",
      "featureList": [
        "Prompt Network Creator (PNC) — automatic generation of search prompts by service type and customer persona",
        "Cross-engine scoring across ChatGPT, Claude, and Gemini",
        "Share-of-voice calculation and competitor leaderboard",
        "Citation crawl and source classification (directories, review platforms, brand pages)",
        "Signal Consistency analysis across AI models",
        "Brand Intelligence scoring"
      ],
      "audience": {
        "@type": "Audience",
        "audienceType": "Marketing managers, SEO professionals, brand strategists, and digital agencies seeking to understand and improve AI search visibility"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free website analysis — enter a domain to receive a Prompt Network report"
      }
    }
    </script>

    <!-- FAQPage schema — highest-impact format for AI citation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is GEO (Generative Engine Optimization)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GEO is the practice of optimizing a brand's presence in AI-generated search results from engines like ChatGPT, Claude, Gemini, and Perplexity. Unlike traditional SEO which targets ranked URL lists, GEO focuses on how often and how prominently a brand is mentioned within AI-generated answers."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Prompt Network Creator (PNC) work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The PNC analyzes a brand's website to extract its service types and customer segments. It then auto-generates 25–30 natural-language search prompts that a real customer might ask an AI engine. These prompts are run against ChatGPT, Claude, and Gemini, and results are scored for brand presence, rank position, and share of voice."
          }
        },
        {
          "@type": "Question",
          "name": "Which AI engines does AnswerMonk analyze?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AnswerMonk analyzes brand visibility across ChatGPT (OpenAI), Claude (Anthropic), Gemini (Google), and Perplexity. Each engine is weighted in the share-of-voice score: ChatGPT 35%, Gemini 35%, Claude 20%, Perplexity 10%."
          }
        },
        {
          "@type": "Question",
          "name": "What is a share-of-voice score in AI search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Share of voice in AI search measures how often your brand appears in AI engine responses relative to competitors, weighted by rank position and engine importance. A score of 100 means your brand is the top-cited answer across all tested prompts and engines. A score of 0 means your brand does not appear."
          }
        },
        {
          "@type": "Question",
          "name": "What are citation sources in AI search results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI engines cite external sources when generating answers. These sources — which may include review platforms, directories, industry publications, and brand websites — determine which brands appear in AI responses. AnswerMonk crawls and classifies these citation sources to show which third-party sites drive AI visibility for your brand and competitors."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a GEO analysis take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A full GEO analysis — including website extraction, prompt generation, cross-engine scoring, and report generation — typically completes in 3 to 8 minutes depending on the number of service segments and AI engine response times."
          }
        }
      ]
    }
    </script>

    <!-- HowTo schema — the 4-step pipeline -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to analyze your brand's AI search visibility with AnswerMonk",
      "description": "A 4-step process to measure how AI search engines like ChatGPT, Claude, and Gemini represent your brand.",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Enter your website URL",
          "text": "Provide your brand's domain. The system crawls your site to identify core services and customer segments using the Prompt Network Creator."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Review discovered services and customer types",
          "text": "The PNC extracts your service categories and customer personas. Confirm or adjust the detected segments before running."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Run the prompt network across AI engines",
          "text": "25–30 intent-based search prompts are automatically generated and run against ChatGPT, Claude, and Gemini simultaneously."
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "Receive your GEO Intelligence report",
          "text": "View your share-of-voice score, competitor leaderboard, citation source breakdown, and signal consistency analysis across all tested AI engines."
        }
      ]
    }
    </script>
