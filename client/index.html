    <!-- FAQPage schema — highest-impact format for AI citation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AnswerMonk?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AnswerMonk is a GEO intelligence platform that measures and improves how brands appear in AI-generated answers from ChatGPT, Gemini, Claude, and Perplexity. It runs your category's buyer prompts across AI engines and returns an AI share-of-voice score, competitor leaderboard, and citation source breakdown."
          }
        },
        {
          "@type": "Question",
          "name": "What is GEO (Generative Engine Optimization)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GEO is the practice of optimizing a brand's visibility in AI-generated search results. Unlike traditional SEO which targets ranked URL lists, GEO focuses on how often and how prominently a brand appears within AI-generated answers. As AI search handles an increasing share of discovery queries, GEO has become essential for brand visibility."
          }
        },
        {
          "@type": "Question",
          "name": "Which AI engines does AnswerMonk analyze?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AnswerMonk analyzes ChatGPT (OpenAI), Gemini (Google), Claude (Anthropic), and Perplexity. Engine weights in the share-of-voice score: ChatGPT 35%, Gemini 35%, Claude 20%, Perplexity 10%."
          }
        },
        {
          "@type": "Question",
          "name": "What is AI share-of-voice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI share-of-voice measures how often your brand appears in AI engine responses for category queries relative to competitors. A score of 100 means your brand is the top-cited answer across all tested prompts and all engines. A score of 0 means AI engines never mention your brand in your category."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a GEO audit take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A full GEO audit typically completes in 3 to 8 minutes depending on the number of service segments detected and AI engine response times."
          }
        },
        {
          "@type": "Question",
          "name": "How is AnswerMonk different from Otterly, Peec AI, or other GEO tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AnswerMonk uses an audit-first methodology — it crawls your site, generates your specific prompt network, and produces a prioritized action report rather than a monitoring dashboard. The focus is on diagnosing why AI engines are not mentioning your brand and which citation sources to target to fix it."
          }
        },
        {
          "@type": "Question",
          "name": "Is the AI visibility audit free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The initial AI visibility audit is free — enter your domain to receive a full report including share-of-voice score, competitor rankings, and top citation sources in your category."
          }
        },
        {
          "@type": "Question",
          "name": "What are citation sources in AI search?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Citation sources are the third-party websites — review platforms, directories, industry publications — that AI engines reference when forming recommendations. Appearing on G2, Capterra, or industry publications significantly increases the likelihood of being cited by ChatGPT, Gemini, or Perplexity."
          }
        }
      ]
    }
    </script>
